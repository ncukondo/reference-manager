name: Build Release Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build binaries for (e.g., v0.28.2)'
        required: true
        type: string

jobs:
  build-binaries:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    strategy:
      matrix:
        target: [linux-x64, linux-arm64, darwin-x64, darwin-arm64, windows-x64]

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: npm install

      - name: Build binary
        run: ./scripts/build-binary.sh ${{ matrix.target }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ref-${{ matrix.target }}
          path: dist/ref-${{ matrix.target }}*

  upload-to-release:
    needs: build-binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Wait for release to be created
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          echo "Waiting for release $TAG to be created..."
          for i in $(seq 1 30); do
            if gh release view "$TAG" &>/dev/null; then
              echo "✓ Release $TAG found"
              exit 0
            fi
            echo "  Attempt $i/30 - release not found yet, waiting 10s..."
            sleep 10
          done
          echo "::error::Release $TAG was not created within 5 minutes"
          exit 1

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: binaries
          merge-multiple: true

      - name: Upload binaries to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          gh release upload "$TAG" binaries/ref-* install.sh install.ps1 --clobber
